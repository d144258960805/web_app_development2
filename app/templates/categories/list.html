{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>類別管理</h2>
    <a href="{{ url_for('category.new_category') }}" class="btn btn-primary">➕ 新增類別</a>
</div>

<div class="row">
    <!-- 支出類別 -->
    <div class="col-md-6 mb-4">
        <div class="card shadow-sm border-danger border-top border-3">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0 text-danger">支出類別</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 align-middle">
                        <tbody>
                            {% for c in categories if c.type == 'expense' %}
                            <tr>
                                <td class="ps-3">{{ c.name }}</td>
                                <td class="text-end pe-3">
                                    <a href="{{ url_for('category.edit_category', id=c.id) }}" class="btn btn-sm btn-outline-primary">編輯</a>
                                    <form action="{{ url_for('category.delete_category', id=c.id) }}" method="POST" class="d-inline" onsubmit="return confirm('確定要刪除「{{ c.name }}」嗎？若該類別下有交易紀錄將無法刪除。');">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">刪除</button>
                                    </form>
                                </td>
                            </tr>
                            {% else %}
                            <tr>
                                <td colspan="2" class="text-center py-3 text-muted">目前沒有支出類別</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 收入類別 -->
    <div class="col-md-6 mb-4">
        <div class="card shadow-sm border-success border-top border-3">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0 text-success">收入類別</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 align-middle">
                        <tbody>
                            {% for c in categories if c.type == 'income' %}
                            <tr>
                                <td class="ps-3">{{ c.name }}</td>
                                <td class="text-end pe-3">
                                    <a href="{{ url_for('category.edit_category', id=c.id) }}" class="btn btn-sm btn-outline-primary">編輯</a>
                                    <form action="{{ url_for('category.delete_category', id=c.id) }}" method="POST" class="d-inline" onsubmit="return confirm('確定要刪除「{{ c.name }}」嗎？若該類別下有交易紀錄將無法刪除。');">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">刪除</button>
                                    </form>
                                </td>
                            </tr>
                            {% else %}
                            <tr>
                                <td colspan="2" class="text-center py-3 text-muted">目前沒有收入類別</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
